<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clipboard and Drop Inspector</title>
  <style>
    body {
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 2rem;
      max-width: 1200px;
    }

    button, label, #pasteTarget, #dropArea {
      font: inherit;
    }

    button {
      padding: 0.35rem 0.65rem;
    }

    label {
      display: inline-block;
      margin-right: 1rem;
      margin-bottom: 0.5rem;
    }

    #pasteTarget, #dropArea {
      border: 1px solid #999;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      min-height: 5rem;
    }

    #dropArea {
      border-style: dashed;
      background: #fafafa;
    }

    #dropArea.dragOver {
      outline: 3px solid #777;
      background: #f0f0f0;
    }

    #summary {
      display: grid;
      gap: 1rem;
      margin: 1rem 0;
    }

    .section {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      background: #fff;
    }

    .section h3 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      gap: 0.35rem 1rem;
    }

    .key {
      font-weight: 600;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin: 0.5rem 0;
    }

    .chip {
      display: inline-block;
      border: 1px solid #aaa;
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      background: #f8f8f8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
    }

    .payload {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem;
      margin: 0.75rem 0;
      background: #fafafa;
    }

    pre {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <h1>Clipboard and Drop Inspector</h1>

  <p>
    <button id="readButton">Inspect via Clipboard API</button>

    <label>
      <input id="unsanitizedHtml" type="checkbox">
      try unsanitized HTML
    </label>
  </p>

  <h2>Paste area</h2>
  <div id="pasteTarget" contenteditable="true">
    Click here and paste with ⌘V.
  </div>

  <h2>Drop area</h2>
  <div id="dropArea">
    Drop files, images, links, selected text, or rich content here.
  </div>

  <h2>Human-readable result</h2>
  <div id="summary">
    No inspection result yet.
  </div>

  <h2>Technical JSON</h2>
  <pre id="output"></pre>

  <script>
    const output = document.querySelector("#output");
    const summary = document.querySelector("#summary");
    const pasteTarget = document.querySelector("#pasteTarget");
    const dropArea = document.querySelector("#dropArea");
    const readButton = document.querySelector("#readButton");
    const unsanitizedHtml = document.querySelector("#unsanitizedHtml");

    function resetOutput() {
      output.textContent = "";
      summary.replaceChildren("No inspection result yet.");
    }

    function show(value) {
      renderSummary(value);
      output.textContent = JSON.stringify(value, null, 2);
    }

    function isTextLike(type) {
      return type.startsWith("text/") ||
        type === "application/json" ||
        type === "application/xml" ||
        type === "image/svg+xml" ||
        type.endsWith("+json") ||
        type.endsWith("+xml");
    }

    async function summarizeBlob(blob, requestedType) {
      const result = {
        requestedType,
        blobType: blob.type,
        size: blob.size
      };

      if (isTextLike(requestedType) || isTextLike(blob.type)) {
        result.payload = {
          kind: "text",
          text: await blob.text()
        };
      }

      return result;
    }

    async function summarizeFile(file, index) {
      const result = {
        index,
        name: file.name,
        type: file.type,
        size: file.size,
        lastModified: file.lastModified,
        lastModifiedISO: Number.isFinite(file.lastModified)
          ? new Date(file.lastModified).toISOString()
          : null
      };

      if (isTextLike(file.type)) {
        result.payload = {
          kind: "text",
          text: await file.text()
        };
      }

      return result;
    }

    function getStringFromDataTransferItem(item) {
      return new Promise((resolve) => {
        item.getAsString((value) => {
          resolve(value);
        });
      });
    }

    async function summarizeDataTransferItem(item, index) {
      const result = {
        index,
        kind: item.kind,
        type: item.type
      };

      if (item.kind === "string") {
        result.payload = {
          kind: "text",
          text: await getStringFromDataTransferItem(item)
        };
      }

      if (item.kind === "file") {
        const file = item.getAsFile();
        result.file = file ? await summarizeFile(file, index) : null;
      }

      return result;
    }

    async function inspectDataTransfer(dataTransfer, method) {
      const result = {
        method,
        dropEffect: dataTransfer.dropEffect,
        effectAllowed: dataTransfer.effectAllowed,
        types: Array.from(dataTransfer.types),
        stringDataByType: {},
        itemCount: dataTransfer.items.length,
        items: [],
        fileCount: dataTransfer.files.length,
        files: []
      };

      for (const type of dataTransfer.types) {
        if (type !== "Files") {
          result.stringDataByType[type] = dataTransfer.getData(type);
        }
      }

      for (const [index, item] of Array.from(dataTransfer.items).entries()) {
        result.items.push(await summarizeDataTransferItem(item, index));
      }

      for (const [index, file] of Array.from(dataTransfer.files).entries()) {
        result.files.push(await summarizeFile(file, index));
      }

      return result;
    }

    function makeElement(tagName, text, className) {
      const element = document.createElement(tagName);

      if (className) {
        element.className = className;
      }

      if (text !== undefined && text !== null) {
        element.textContent = String(text);
      }

      return element;
    }

    function addSection(title) {
      const section = makeElement("section", null, "section");
      section.appendChild(makeElement("h3", title));
      summary.appendChild(section);
      return section;
    }

    function addGridRow(grid, key, value) {
      grid.appendChild(makeElement("div", key, "key"));
      grid.appendChild(makeElement("div", value));
    }

    function addGrid(section, rows) {
      const grid = makeElement("div", null, "grid");

      for (const [key, value] of rows) {
        addGridRow(grid, key, value);
      }

      section.appendChild(grid);
      return grid;
    }

    function addTypeChips(section, types) {
      const chips = makeElement("div", null, "chips");

      for (const type of types) {
        chips.appendChild(makeElement("span", type || "(empty string)", "chip"));
      }

      section.appendChild(chips);
    }

    function addPayload(section, title, payload) {
      const wrapper = makeElement("div", null, "payload");
      wrapper.appendChild(makeElement("h4", title));

      if (!payload) {
        wrapper.appendChild(makeElement("p", "No payload field."));
        section.appendChild(wrapper);
        return;
      }

      addGrid(wrapper, [
        ["Kind", payload.kind ?? ""]
      ]);

      wrapper.appendChild(makeElement("pre", payload.text ?? ""));
      section.appendChild(wrapper);
    }

    function renderBlobRepresentation(section, representation) {
      const subSection = makeElement("div", null, "payload");
      subSection.appendChild(makeElement("h4", "Blob representation"));

      addGrid(subSection, [
        ["Requested type", representation.requestedType],
        ["Blob type", representation.blobType],
        ["Size", representation.size]
      ]);

      if (representation.payload) {
        addPayload(subSection, "Text payload", representation.payload);
      }

      section.appendChild(subSection);
    }

    function renderFile(section, file) {
      const fileSection = makeElement("div", null, "payload");
      fileSection.appendChild(makeElement("h4", "File"));

      addGrid(fileSection, [
        ["Index", file.index],
        ["Name", file.name],
        ["Type", file.type],
        ["Size", file.size],
        ["Last modified", file.lastModified],
        ["Last modified ISO", file.lastModifiedISO]
      ]);

      if (file.payload) {
        addPayload(fileSection, "Text payload", file.payload);
      }

      section.appendChild(fileSection);
    }

    function renderSummary(result) {
      summary.replaceChildren();

      if (result.errorName || result.error) {
        const section = addSection("Error");

        addGrid(section, [
          ["Error", result.error || ""],
          ["Error name", result.errorName || ""],
          ["Error message", result.errorMessage || ""],
          ["Note", result.note || ""]
        ]);

        return;
      }

      const overview = addSection("Overview");

      addGrid(overview, [
        ["Method", result.method || ""],
        ["Item count", result.itemCount ?? ""],
        ["File count", result.fileCount ?? result.files?.length ?? ""],
        ["dropEffect", result.dropEffect ?? ""],
        ["effectAllowed", result.effectAllowed ?? ""]
      ]);

      if (Array.isArray(result.types)) {
        overview.appendChild(makeElement("h4", "DataTransfer types"));
        addTypeChips(overview, result.types);
      }

      if (result.stringDataByType && Object.keys(result.stringDataByType).length > 0) {
        const stringData = addSection("DataTransfer.getData(type)");

        for (const [type, value] of Object.entries(result.stringDataByType)) {
          addPayload(stringData, type, {
            kind: "text",
            text: value
          });
        }
      }

      if (Array.isArray(result.items) && result.items.length > 0) {
        const items = addSection("Items");

        for (const item of result.items) {
          const itemSection = makeElement("div", null, "payload");
          itemSection.appendChild(makeElement("h4", `Item ${item.index ?? item.itemIndex}`));

          addGrid(itemSection, [
            ["Index", item.index ?? item.itemIndex ?? ""],
            ["Kind", item.kind ?? ""],
            ["Type", item.type ?? ""],
            ["Presentation style", item.presentationStyle ?? ""]
          ]);

          if (Array.isArray(item.types)) {
            itemSection.appendChild(makeElement("h4", "Types"));
            addTypeChips(itemSection, item.types);
          }

          if (item.payload) {
            addPayload(itemSection, "Item string payload", item.payload);
          }

          if (Array.isArray(item.representations)) {
            for (const representation of item.representations) {
              renderBlobRepresentation(itemSection, representation);
            }
          }

          if (item.file) {
            renderFile(itemSection, item.file);
          }

          items.appendChild(itemSection);
        }
      }

      if (Array.isArray(result.files) && result.files.length > 0) {
        const files = addSection("Files");

        for (const file of result.files) {
          renderFile(files, file);
        }
      }
    }

    async function inspectViaClipboardApi() {
      resetOutput();

      if (!navigator.clipboard || !navigator.clipboard.read) {
        show({
          error: "navigator.clipboard.read() is not available in this browser/context."
        });
        return;
      }

      try {
        const options = unsanitizedHtml.checked
          ? { unsanitized: ["text/html"] }
          : undefined;

        let clipboardItems;

        try {
          clipboardItems = options
            ? await navigator.clipboard.read(options)
            : await navigator.clipboard.read();
        } catch (error) {
          if (!options) {
            throw error;
          }

          clipboardItems = await navigator.clipboard.read();
        }

        const result = {
          method: "navigator.clipboard.read()",
          itemCount: clipboardItems.length,
          items: []
        };

        for (const [itemIndex, clipboardItem] of clipboardItems.entries()) {
          const itemResult = {
            itemIndex,
            presentationStyle: clipboardItem.presentationStyle,
            types: clipboardItem.types,
            representations: []
          };

          for (const type of clipboardItem.types) {
            const blob = await clipboardItem.getType(type);
            itemResult.representations.push(await summarizeBlob(blob, type));
          }

          result.items.push(itemResult);
        }

        show(result);
      } catch (error) {
        show({
          errorName: error.name,
          errorMessage: error.message,
          note: "Click the button directly, allow the browser paste prompt, and use a secure context such as HTTPS or localhost."
        });
      }
    }

    async function inspectPasteEvent(event) {
      event.preventDefault();
      resetOutput();

      const result = await inspectDataTransfer(event.clipboardData, "paste event");
      show(result);
    }

    function handleDragEnter(event) {
      event.preventDefault();
      dropArea.classList.add("dragOver");
    }

    function handleDragOver(event) {
      event.preventDefault();

      if (event.dataTransfer) {
        event.dataTransfer.dropEffect = "copy";
      }
    }

    function handleDragLeave(event) {
      if (!dropArea.contains(event.relatedTarget)) {
        dropArea.classList.remove("dragOver");
      }
    }

    async function inspectDropEvent(event) {
      event.preventDefault();
      dropArea.classList.remove("dragOver");
      resetOutput();

      const result = await inspectDataTransfer(event.dataTransfer, "drop event");
      show(result);
    }

    readButton.addEventListener("click", inspectViaClipboardApi);
    pasteTarget.addEventListener("paste", inspectPasteEvent);

    dropArea.addEventListener("dragenter", handleDragEnter);
    dropArea.addEventListener("dragover", handleDragOver);
    dropArea.addEventListener("dragleave", handleDragLeave);
    dropArea.addEventListener("drop", inspectDropEvent);
  </script>
</body>
</html>
