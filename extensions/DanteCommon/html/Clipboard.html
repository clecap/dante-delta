<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clipboard Inspector</title>
  <style>
    body {
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 2rem;
      max-width: 1100px;
    }

    button, label, #pasteTarget {
      font: inherit;
    }

    #pasteTarget {
      border: 1px solid #999;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      min-height: 5rem;
    }

    pre {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
      white-space: pre-wrap;
    }

    img {
      max-width: 480px;
      max-height: 320px;
      display: block;
      margin: 1rem 0;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Clipboard Inspector</h1>

  <p>
    <button id="readButton">Inspect via Clipboard API</button>
    <label>
      <input id="unsanitizedHtml" type="checkbox">
      try unsanitized HTML
    </label>
  </p>

  <div id="pasteTarget" contenteditable="true">
    Or click here and paste with ⌘V. This inspects what a paste event would expose.
  </div>

  <h2>Result</h2>
  <pre id="output"></pre>

  <h2>Previews</h2>
  <div id="previews"></div>

  <script>
    const output = document.querySelector("#output");
    const previews = document.querySelector("#previews");
    const pasteTarget = document.querySelector("#pasteTarget");
    const readButton = document.querySelector("#readButton");
    const unsanitizedHtml = document.querySelector("#unsanitizedHtml");

    function resetOutput() {
      output.textContent = "";
      previews.replaceChildren();
    }

    function show(value) {
      output.textContent = JSON.stringify(value, null, 2);
    }

    function truncate(value, maxLength = 5000) {
      if (value.length <= maxLength) {
        return value;
      }

      return value.slice(0, maxLength) + `\n… truncated after ${maxLength} characters`;
    }

    function isTextLike(type) {
      return type.startsWith("text/") ||
        type === "application/json" ||
        type === "application/xml" ||
        type === "image/svg+xml" ||
        type.endsWith("+json") ||
        type.endsWith("+xml");
    }

    function likelyPasteMeaning(type) {
      if (type === "text/plain") {
        return "Plain text: text fields, code editors, terminals, search boxes.";
      }

      if (type === "text/html") {
        return "Rich HTML: email composers, web editors, Google Docs, CMS editors.";
      }

      if (type === "text/uri-list") {
        return "URL list: browsers, link fields, apps that accept links.";
      }

      if (type === "text/rtf" || type === "application/rtf") {
        return "Rich text: word processors and rich-text editors.";
      }

      if (type.startsWith("image/")) {
        return "Image data: image editors, document editors, chat apps, design tools.";
      }

      if (type === "application/json" || type.endsWith("+json")) {
        return "Structured JSON: developer tools or apps that explicitly accept JSON.";
      }

      return "Target-specific: only apps or sites that understand this format can use it.";
    }

    function imageDimensions(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();

        img.onload = () => {
          resolve({
            width: img.naturalWidth,
            height: img.naturalHeight
          });
        };

        img.onerror = reject;
        img.src = url;
      });
    }

    async function summarizeBlob(blob, type) {
      const summary = {
        type,
        blobType: blob.type || "(not reported)",
        sizeBytes: blob.size,
        likelyPasteMeaning: likelyPasteMeaning(type)
      };

      if (isTextLike(type)) {
        summary.textPreview = truncate(await blob.text());
      }

      if (type.startsWith("image/")) {
        const url = URL.createObjectURL(blob);
        summary.objectUrl = url;

        try {
          summary.image = await imageDimensions(url);
        } catch {
          summary.image = "(could not decode image dimensions)";
        }

        const img = document.createElement("img");
        img.src = url;
        img.alt = `${type}, ${blob.size} bytes`;
        previews.appendChild(img);
      }

      return summary;
    }

    async function inspectViaClipboardApi() {
      resetOutput();

      if (!navigator.clipboard || !navigator.clipboard.read) {
        show({
          error: "navigator.clipboard.read() is not available in this browser/context."
        });
        return;
      }

      try {
        const options = unsanitizedHtml.checked
          ? { unsanitized: ["text/html"] }
          : undefined;

        let items;

        try {
          items = options
            ? await navigator.clipboard.read(options)
            : await navigator.clipboard.read();
        } catch (error) {
          if (!options) {
            throw error;
          }

          items = await navigator.clipboard.read();
        }

        const result = {
          method: "navigator.clipboard.read()",
          itemCount: items.length,
          items: []
        };

        for (const [itemIndex, item] of items.entries()) {
          const itemResult = {
            itemIndex,
            presentationStyle: item.presentationStyle || "(not reported)",
            types: item.types,
            representations: []
          };

          for (const type of item.types) {
            const blob = await item.getType(type);
            itemResult.representations.push(await summarizeBlob(blob, type));
          }

          result.items.push(itemResult);
        }

        show(result);
      } catch (error) {
        show({
          errorName: error.name,
          errorMessage: error.message,
          note: "Click the button directly, allow the browser paste prompt, and run this from localhost or HTTPS."
        });
      }
    }

    function inspectPasteEvent(event) {
      event.preventDefault();
      resetOutput();

      const data = event.clipboardData;

      const result = {
        method: "paste event",
        types: Array.from(data.types).map((type) => ({
          type,
          likelyPasteMeaning: likelyPasteMeaning(type)
        })),
        items: Array.from(data.items).map((item, index) => ({
          index,
          kind: item.kind,
          type: item.type,
          likelyPasteMeaning: likelyPasteMeaning(item.type)
        })),
        files: Array.from(data.files).map((file, index) => ({
          index,
          name: file.name,
          type: file.type,
          sizeBytes: file.size,
          likelyPasteMeaning: likelyPasteMeaning(file.type)
        })),
        textPlain: truncate(data.getData("text/plain")),
        textHtml: truncate(data.getData("text/html")),
        textUriList: truncate(data.getData("text/uri-list"))
      };

      show(result);
    }

    readButton.addEventListener("click", inspectViaClipboardApi);
    pasteTarget.addEventListener("paste", inspectPasteEvent);
  </script>
</body>
</html>
